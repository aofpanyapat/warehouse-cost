<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>คลังมือถือ - ต้นทุน/กำไร</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap');

:root{
  --bg:#06111f;
  --bg-2:#081b2f;
  --panel:rgba(12,28,49,.78);
  --panel-2:rgba(15,39,68,.72);
  --panel-3:rgba(21,52,88,.74);
  --glass:rgba(255,255,255,.07);
  --line:rgba(117,205,255,.20);
  --line-strong:rgba(117,205,255,.42);
  --cyan:#55e7ff;
  --cyan-2:#2aa8ff;
  --blue:#6ea8ff;
  --purple:#a78bfa;
  --pink:#ff6ec7;
  --yellow:#ffd166;
  --orange:#ff9f43;
  --teal:#5fffd6;
  --red:#ff6b7a;
  --green:#6dff9d;
  --text:#f4fbff;
  --text-dim:#a9bdd4;
  --shadow:0 24px 80px rgba(0,0,0,.45);
  --glow:0 0 22px rgba(85,231,255,.30);
  --radius:22px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;color:var(--text);
  font-family:'Sarabun','Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.55;
  min-height:100vh;
  background:
    radial-gradient(circle at 10% 5%, rgba(85,231,255,.22), transparent 28%),
    radial-gradient(circle at 86% 8%, rgba(167,139,250,.20), transparent 28%),
    radial-gradient(circle at 72% 90%, rgba(95,255,214,.12), transparent 32%),
    linear-gradient(135deg,#03101f 0%,#071b2f 45%,#030914 100%);
  overflow-x:hidden;
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-2;
  background-image:
    linear-gradient(rgba(85,231,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(85,231,255,.06) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.78),transparent 90%);
}
body:after{
  content:"";position:fixed;inset:-20%;pointer-events:none;z-index:-1;
  background:conic-gradient(from 160deg, transparent, rgba(85,231,255,.08), transparent, rgba(167,139,250,.08), transparent);
  animation:orbitGlow 18s linear infinite;
}
@keyframes orbitGlow{to{transform:rotate(1turn)}}
.app{max-width:1280px;margin:0 auto;padding:30px 20px 80px;}

/* header */
.header{
  position:relative;overflow:hidden;
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;
  border:1px solid var(--line);border-radius:30px;padding:24px 26px;margin-bottom:20px;
  background:linear-gradient(135deg,rgba(17,44,76,.84),rgba(8,20,38,.72));
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
  backdrop-filter:blur(18px);
}
.header:before{
  content:"";position:absolute;inset:-2px;background:
    linear-gradient(90deg,transparent,rgba(85,231,255,.18),transparent),
    radial-gradient(circle at 85% 25%, rgba(255,209,102,.22), transparent 25%);
  pointer-events:none;
}
.header:after{
  content:"COST CONTROL SYSTEM";position:absolute;right:24px;top:18px;
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:rgba(169,189,212,.36);
}
.header h1{
  position:relative;font-family:'Space Grotesk','Sarabun',system-ui,sans-serif;font-size:30px;font-weight:800;margin:0;
  letter-spacing:-.02em;color:var(--text);text-shadow:0 0 18px rgba(85,231,255,.28);
}
.header h1:before{content:"◉";color:var(--green);font-size:16px;margin-right:10px;filter:drop-shadow(0 0 8px var(--green));}
.header .sub{position:relative;color:var(--text-dim);font-size:14px;margin-top:8px;max-width:680px;}
.stamp{
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--cyan);
  background:rgba(85,231,255,.10);border:1px solid var(--line-strong);
  padding:8px 14px;border-radius:999px;letter-spacing:.06em;box-shadow:var(--glow);
}
button#export-excel{
  background:linear-gradient(135deg,var(--yellow),#ffb703);color:#211700;border:none;padding:11px 18px;border-radius:14px;
  font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 12px 28px rgba(255,209,102,.22), inset 0 1px 0 rgba(255,255,255,.35);
}
button#export-excel:hover{filter:brightness(1.06);transform:translateY(-1px);}

/* sidebar navigation */
.workspace{
  display:grid;grid-template-columns:268px minmax(0,1fr);gap:20px;align-items:start;
}
.sidebar{
  position:sticky;top:18px;z-index:30;overflow:hidden;
  background:linear-gradient(180deg,rgba(11,31,56,.88),rgba(4,16,31,.78));
  border:1px solid var(--line);border-radius:30px;padding:16px;
  backdrop-filter:blur(18px);box-shadow:0 24px 70px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.08);
}
.sidebar:before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 18% 0%,rgba(85,231,255,.20),transparent 30%),linear-gradient(90deg,rgba(85,231,255,.10),transparent 34%);
}
.sidebar-brand{position:relative;padding:8px 10px 14px;margin-bottom:10px;border-bottom:1px solid var(--line);}
.sidebar-brand .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--cyan);text-transform:uppercase;}
.sidebar-brand .title{font-weight:800;font-size:17px;margin-top:5px;color:var(--text);}
.sidebar-brand .desc{font-size:11.5px;color:var(--text-dim);margin-top:4px;line-height:1.45;}
.tabs{
  position:relative;display:flex;flex-direction:column;gap:8px;margin:0;
}
.tab{
  position:relative;display:flex;align-items:center;gap:10px;min-height:46px;text-align:left;padding:12px 13px;border-radius:17px;cursor:pointer;
  font-size:13.5px;font-weight:800;color:var(--text-dim);transition:all .18s ease;border:1px solid transparent;
}
.tab:before{content:"";width:6px;height:6px;border-radius:999px;background:rgba(169,189,212,.45);box-shadow:none;flex:0 0 auto;}
.tab:hover:not(.active){background:rgba(255,255,255,.06);color:var(--text);border-color:rgba(255,255,255,.09);transform:translateX(2px);}
.tab.active{
  background:linear-gradient(135deg,rgba(85,231,255,.96),rgba(110,168,255,.92));color:#03101f;
  box-shadow:0 12px 28px rgba(85,231,255,.26), inset 0 1px 0 rgba(255,255,255,.45);
}
.tab.active:before{background:#03101f;box-shadow:0 0 12px rgba(3,16,31,.45);}
.sidebar-footer{position:relative;margin-top:14px;padding:12px;border:1px solid rgba(85,231,255,.16);border-radius:20px;background:rgba(255,255,255,.045);}
.sidebar-footer .mini{font-size:11.5px;color:var(--text-dim);line-height:1.5;}
.sidebar-footer b{color:var(--yellow);}
.content-shell{min-width:0;}
@media (max-width:980px){
  .workspace{grid-template-columns:1fr;}
  .sidebar{position:relative;top:auto;border-radius:24px;}
  .tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));}
  .tab{min-height:42px;}
}
@media (max-width:560px){.tabs{grid-template-columns:1fr;}}

/* panel */
.panel{
  position:relative;background:linear-gradient(180deg,rgba(13,30,53,.84),rgba(7,18,35,.80));
  border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:var(--shadow);
  backdrop-filter:blur(20px);overflow-x:auto;overflow-y:visible;min-width:0;
}
.panel:before{
  content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.75;
}

/* forms */
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:13px;align-items:flex-end;}
input,select{
  background:rgba(4,17,33,.70);border:1px solid var(--line);color:var(--text);
  padding:10px 12px;border-radius:14px;font-size:13.5px;font-family:inherit;
  transition:all .15s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
input:hover,select:hover{border-color:rgba(85,231,255,.34);}
input:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 4px rgba(85,231,255,.13), 0 0 24px rgba(85,231,255,.14);}
button{
  background:linear-gradient(135deg,var(--cyan),var(--blue));color:#03101f;border:none;padding:11px 18px;border-radius:14px;
  font-weight:800;font-size:13.5px;cursor:pointer;transition:all .14s ease;box-shadow:0 10px 28px rgba(85,231,255,.20);
}
button:hover{filter:brightness(1.08);transform:translateY(-1px);}
button:active{transform:scale(.98);}
button.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--text-dim);padding:7px 13px;box-shadow:none;}
button.ghost:hover{border-color:var(--red);color:var(--red);background:rgba(255,107,122,.08);}
button.danger{background:linear-gradient(135deg,var(--red),#ff3d68);color:#fff;}

h3{
  font-size:15px;color:var(--text);font-weight:800;
  margin:0 0 16px;padding:0 0 0 14px;border-left:4px solid var(--cyan);
  text-shadow:0 0 14px rgba(85,231,255,.18);
}

/* tables */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;overflow:hidden;border-radius:18px;border:1px solid var(--line);background:rgba(5,17,33,.36);}
th{
  text-align:left;color:#cde7f7;font-weight:800;padding:11px 10px;
  border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.055em;
  background:rgba(85,231,255,.08);position:sticky;top:0;z-index:3;
}
td{padding:10px;border-bottom:1px solid rgba(117,205,255,.12);color:#edf8ff;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(85,231,255,.075);}
td.num,th.num{text-align:right;font-family:'JetBrains Mono',monospace;}
td input{width:82px;}
tfoot td{background:rgba(255,209,102,.07);}
.empty{
  text-align:center;color:var(--text-dim);padding:36px 16px;font-size:13.5px;
  border:1.5px dashed var(--line);border-radius:22px;background:rgba(255,255,255,.035);
}

/* summary cards */
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:22px;}
@media (max-width:760px){.grid3{grid-template-columns:1fr;}}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:22px;}
@media (max-width:980px){.grid4{grid-template-columns:1fr 1fr;}}
@media (max-width:560px){.grid4{grid-template-columns:1fr;}}
.card{
  position:relative;overflow:hidden;background:linear-gradient(145deg,rgba(20,50,84,.76),rgba(7,20,38,.78));
  border:1px solid var(--line);border-radius:24px;padding:20px;text-align:center;
  box-shadow:0 18px 46px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);
}
.card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 15%,rgba(85,231,255,.20),transparent 28%);opacity:.85;}
.card .big{position:relative;font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;line-height:1.15;}
.card .label{position:relative;color:var(--text-dim);font-size:12px;margin-top:7px;}
.card.profit{border-color:rgba(109,255,157,.36);}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
  background:linear-gradient(135deg,var(--teal),var(--cyan));color:#03121d;padding:12px 22px;border-radius:999px;
  font-size:13.5px;font-weight:800;opacity:0;transition:all .25s;pointer-events:none;
  box-shadow:0 14px 40px rgba(0,0,0,.38),0 0 26px rgba(85,231,255,.24);z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.section-title{
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--yellow);font-weight:800;text-transform:uppercase;
  letter-spacing:.08em;margin:26px 0 13px;padding-bottom:8px;border-bottom:1px solid var(--line);
}
.section-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,rgba(255,209,102,.36),transparent);}
.hint{color:var(--text-dim);font-size:12.5px;margin-top:7px;line-height:1.7;}
.tag-status{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid currentColor;}
.tag-status.profit{background:rgba(109,255,157,.10);color:var(--green);}
.tag-status.loss{background:rgba(255,107,122,.10);color:var(--red);}
.hc-group{display:inline-flex;align-items:stretch;gap:3px;background:rgba(4,17,33,.70);border:1px solid var(--line);border-radius:14px;padding:4px;vertical-align:middle;}
.hc-cell{display:inline-flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.05);border-radius:10px;padding:4px 7px;min-width:46px;}
.hc-cell .hc-label{font-size:9px;color:var(--text-dim);font-weight:700;line-height:1;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.hc-cell input{-moz-appearance:textfield;background:transparent;border:none;color:var(--cyan);font-weight:800;font-size:13.5px;text-align:center;padding:1px 0;width:38px;font-family:'JetBrains Mono',monospace;box-shadow:none;}
.hc-cell input::-webkit-outer-spin-button,.hc-cell input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.hc-cell input:focus{outline:none;box-shadow:none;}
.hc-cell input::placeholder{color:var(--text-dim);opacity:.55;font-weight:600;}
.hc-sep{display:inline-flex;align-items:center;color:var(--text-dim);font-weight:800;padding:0 2px;font-size:11px;}
.wage-box,.subblock{
  background:linear-gradient(145deg,rgba(21,52,88,.65),rgba(5,17,33,.56));border:1px solid var(--line);border-radius:24px;
  padding:18px;margin-bottom:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
canvas{filter:drop-shadow(0 0 12px rgba(85,231,255,.08));}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:#06111f;}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--cyan),var(--blue));border-radius:999px;}
@media (max-width:720px){
  .app{padding:18px 12px 60px;}
  .header{padding:20px;border-radius:24px;}
  .header h1{font-size:24px;}
  .panel{padding:16px;border-radius:24px;overflow-x:auto;}
  .tabs{position:static;}
  .tab{min-width:46%;}

<body>
<div class="app" id="app"><div style="text-align:center;padding:40px;color:#9AA0AA">กำลังโหลด...</div></div>
<div class="toast" id="toast"></div>

<script>
// ==== Supabase connection ====
const SUPABASE_URL = 'https://efzmdaxqilufykeriqjg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_g6lMR25M9TFdSmfVaPn5qw_4xhM5VXz';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_ACTIVITIES = [
  {id:'p1', name:'Inbound + ASN + Put PB-01', price:3.5, standardWorkers:2, minutesPerUnit:2, monthlyVolume:1087},
  {id:'p2', name:'Pick to QC + เตรียมของ', price:2.5, standardWorkers:2, minutesPerUnit:0.5, monthlyVolume:3017},
  {id:'p3', name:'Put Back PB-02 ถึง PB-05', price:2.5, standardWorkers:2, minutesPerUnit:1, monthlyVolume:2063},
  {id:'p4', name:'Handling OUT + เตรียมของ', price:3.5, standardWorkers:3, minutesPerUnit:2.22, monthlyVolume:6586},
  {id:'p5', name:'Return + Put Back Bin เดิม', price:3.0, standardWorkers:2, minutesPerUnit:1, monthlyVolume:5511},
  {id:'p6', name:'งานแพค กล่อง+Bubble ส่งหน้า', price:3.0, standardWorkers:2, minutesPerUnit:1, monthlyVolume:0},
];

let state = { activities: [], logs: [], employees: [], manualHeadcounts: {}, tab: 'dashboard',
  timeSettings: { hoursPerDay: 8, daysPerMonth: 26 },
  wageOverride: null,
  staffCost: {
    regularCount: 2, regularSalary: 22000, otDivisor: 170,
    regularOtCount: 2, regularOtHoursPerDay: 2, regularOtDays: 26,
    tempCount: 4, tempWage: 14040,
    tempExtraCount: 0, tempExtraHoursPerDay: 0, tempExtraDays: 0
  },
  storage: { price: 0.3, volume: 0, days: 30 }
};

function uid(){ return 'id' + Math.random().toString(36).slice(2,9); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmt(n){ return Number(n||0).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

// ---- mapping helpers between JS (camelCase) and Supabase columns (snake_case) ----
function activityToRow(a){
  return { id:a.id, name:a.name, price:a.price, standard_workers:a.standardWorkers, minutes_per_unit:a.minutesPerUnit, monthly_volume:a.monthlyVolume||0 };
}
function rowToActivity(r){
  return { id:r.id, name:r.name, price:Number(r.price), standardWorkers:Number(r.standard_workers), minutesPerUnit:Number(r.minutes_per_unit), monthlyVolume:Number(r.monthly_volume) };
}
function logToRow(l){
  return {
    id:l.id, date:l.date, activity_id:l.activityId, round_label:l.roundLabel||null, volume:l.volume,
    regular_workers:l.regularWorkers||0, temp_workers:l.tempWorkers||0, other_workers:l.otherWorkers||0,
    ot_hours_regular:l.otHoursRegular||0, ot_hours_temp:l.otHoursTemp||0, actual_hours:l.actualHours||0
  };
}
function rowToLog(r){
  return {
    id:r.id, date:r.date, activityId:r.activity_id, roundLabel:r.round_label||'', volume:Number(r.volume),
    regularWorkers:Number(r.regular_workers), tempWorkers:Number(r.temp_workers), otherWorkers:Number(r.other_workers),
    otHoursRegular:Number(r.ot_hours_regular), otHoursTemp:Number(r.ot_hours_temp), actualHours:Number(r.actual_hours)
  };
}
function staffCostToRow(s){
  return {
    id:1, regular_count:s.regularCount, regular_salary:s.regularSalary, ot_divisor:s.otDivisor,
    regular_ot_count:s.regularOtCount, regular_ot_hours_per_day:s.regularOtHoursPerDay, regular_ot_days:s.regularOtDays,
    temp_count:s.tempCount, temp_wage:s.tempWage,
    temp_extra_count:s.tempExtraCount, temp_extra_hours_per_day:s.tempExtraHoursPerDay, temp_extra_days:s.tempExtraDays
  };
}
function rowToStaffCost(r){
  return {
    regularCount:Number(r.regular_count), regularSalary:Number(r.regular_salary), otDivisor:Number(r.ot_divisor),
    regularOtCount:Number(r.regular_ot_count), regularOtHoursPerDay:Number(r.regular_ot_hours_per_day), regularOtDays:Number(r.regular_ot_days),
    tempCount:Number(r.temp_count), tempWage:Number(r.temp_wage),
    tempExtraCount:Number(r.temp_extra_count), tempExtraHoursPerDay:Number(r.temp_extra_hours_per_day), tempExtraDays:Number(r.temp_extra_days)
  };
}

async function loadFromSupabase(){
  try{
    const [actRes, logRes, staffRes, storRes, hcRes] = await Promise.all([
      sb.from('activities').select('*'),
      sb.from('work_logs').select('*').order('date', {ascending:true}),
      sb.from('staff_cost').select('*').eq('id',1).maybeSingle(),
      sb.from('storage_settings').select('*').eq('id',1).maybeSingle(),
      sb.from('manual_headcounts').select('*')
    ]);

    // activities: seed defaults if table is empty
    if(actRes.data && actRes.data.length){
      state.activities = actRes.data.map(rowToActivity);
      const missing = DEFAULT_ACTIVITIES.filter(def => !state.activities.find(a=>a.id===def.id));
      if(missing.length){
        await sb.from('activities').insert(missing.map(activityToRow));
        state.activities = state.activities.concat(missing);
      }
    } else {
      await sb.from('activities').insert(DEFAULT_ACTIVITIES.map(activityToRow));
      state.activities = DEFAULT_ACTIVITIES.map(a=>Object.assign({},a));
    }

    state.logs = (logRes.data||[]).map(rowToLog);

    if(staffRes.data){ state.staffCost = rowToStaffCost(staffRes.data); }
    else { await sb.from('staff_cost').insert(staffCostToRow(state.staffCost)); }

    if(storRes.data){ state.storage = { price:Number(storRes.data.price), volume:Number(storRes.data.volume), days:Number(storRes.data.days) }; }
    else { await sb.from('storage_settings').insert({id:1, ...state.storage}); }

    state.manualHeadcounts = {};
    (hcRes.data||[]).forEach(r=>{
      state.manualHeadcounts[r.key] = {};
      if(r.regular!==null) state.manualHeadcounts[r.key].regular = Number(r.regular);
      if(r.temp!==null) state.manualHeadcounts[r.key].temp = Number(r.temp);
      if(r.other!==null) state.manualHeadcounts[r.key].other = Number(r.other);
    });

    showToast('โหลดข้อมูลจาก Supabase สำเร็จ');
  }catch(e){
    console.error(e);
    showToast('โหลดข้อมูลไม่สำเร็จ เช็คอินเทอร์เน็ต/การตั้งค่า Supabase');
    if(!state.activities.length) state.activities = DEFAULT_ACTIVITIES.map(a=>Object.assign({},a));
  }
  render();
}

// ---- calculations ----
// standard labor cost per unit for an activity, using the actual worker count entered on the day
function unitLaborCost(act, workers){
  const hoursPerUnit = Number(act.minutesPerUnit||0) / 60;
  return hoursPerUnit * Number(workers||act.standardWorkers) * referenceWage().normal;
}
function logRevenue(l){
  const act = state.activities.find(a=>a.id===l.activityId);
  return act ? Number(act.price) * Number(l.volume||0) : 0;
}
// ---- fixed/temp staff cost (monthly) ----
function staffCalc(){
  const s = state.staffCost;
  const regularTotal = s.regularCount * s.regularSalary;
  const regularHourlyRate = s.regularSalary / s.otDivisor;
  const otRatePerHour = regularHourlyRate * 1.5;
  const regularOtTotal = s.regularOtCount * s.regularOtHoursPerDay * s.regularOtDays * otRatePerHour;
  const tempTotal = s.tempCount * s.tempWage;
  const tempHourlyRate = s.tempWage / s.otDivisor; // actual rate, no 1.5x
  const tempExtraTotal = s.tempExtraCount * s.tempExtraHoursPerDay * s.tempExtraDays * tempHourlyRate;
  const grandTotal = regularTotal + regularOtTotal + tempTotal + tempExtraTotal;
  return { regularTotal, regularHourlyRate, otRatePerHour, regularOtTotal, tempTotal, tempHourlyRate, tempExtraTotal, grandTotal };
}

// daily log cost, split by regular vs temp workers actually used on that entry
// if l.actualHours is provided (>0), cost is based on actual wall-clock hours worked instead of the standard estimate
function logHours(l){
  const act = state.activities.find(a=>a.id===l.activityId);
  if(!act) return 0;
  if(Number(l.actualHours) > 0) return Number(l.actualHours);
  const hoursPerUnit = Number(act.minutesPerUnit||0) / 60;
  return hoursPerUnit * Number(l.volume||0); // fallback: standard estimate
}
function logNormalCost(l){
  const act = state.activities.find(a=>a.id===l.activityId);
  if(!act) return 0;
  const rates = staffCalc();
  const hours = logHours(l);
  const regularPortion = Number(l.regularWorkers||0) * rates.regularHourlyRate;
  const tempPortion = Number(l.tempWorkers||0) * rates.tempHourlyRate;
  const otherPortion = Number(l.otherWorkers||0) * rates.regularHourlyRate; // costed at regular staff rate
  return hours * (regularPortion + tempPortion + otherPortion);
}
function logOtCost(l){
  const rates = staffCalc();
  const regularOt = Number(l.regularWorkers||0) * Number(l.otHoursRegular||0) * rates.otRatePerHour;
  const tempOt = Number(l.tempWorkers||0) * Number(l.otHoursTemp||0) * rates.tempHourlyRate;
  return regularOt + tempOt;
}
function logCost(l){ return logNormalCost(l) + logOtCost(l); }
function logProfit(l){ return logRevenue(l) - logCost(l); }
function logCostPerUnit(l){ const v = Number(l.volume||0); return v > 0 ? logCost(l)/v : 0; }
function logTotalWorkers(l){ return Number(l.regularWorkers||0) + Number(l.tempWorkers||0) + Number(l.otherWorkers||0); }
function logPersonHours(l){ return logHours(l) * logTotalWorkers(l); } // man-hours actually spent
function logCostPerPersonHour(l){ const ph = logPersonHours(l); return ph > 0 ? logCost(l)/ph : 0; }
function logProductivity(l){ const ph = logPersonHours(l); return ph > 0 ? Number(l.volume||0)/ph : 0; } // units per person-hour

// weighted-average reference wage, auto-derived from the "ต้นทุนพนักงาน" page — OT applies to regular staff only
function referenceWage(){
  const s = state.staffCost;
  const rates = staffCalc();
  const ts = state.timeSettings;
  const totalHeads = s.regularCount + s.tempCount;
  const totalTeamHoursPerMonth = totalHeads * ts.hoursPerDay * ts.daysPerMonth;
  // per-person hourly rate: total staff cost / total person-hours per month
  // 120,348 บาท/เดือน ÷ 1,248 person-hours/เดือน = บาท/คน/ชม.
  const calculated = totalTeamHoursPerMonth > 0 ? rates.grandTotal / totalTeamHoursPerMonth : 0;
  const normal = (state.wageOverride !== null && state.wageOverride !== undefined) ? state.wageOverride : calculated;
  const ot = rates.otRatePerHour; // regular staff only, ×1.5
  return { normal, ot, totalTeamHoursPerMonth, calculated };
}

function renderDashboard(){
  // aggregate logs by day and month
  const byDay = {}, byMonth = {};
  state.logs.forEach(l=>{
    const rev = logRevenue(l), cost = logCost(l), vol = Number(l.volume||0);
    byDay[l.date] = byDay[l.date] || {rev:0, cost:0, vol:0};
    byDay[l.date].rev += rev; byDay[l.date].cost += cost; byDay[l.date].vol += vol;
    const m = l.date.slice(0,7);
    byMonth[m] = byMonth[m] || {rev:0, cost:0, vol:0};
    byMonth[m].rev += rev; byMonth[m].cost += cost; byMonth[m].vol += vol;
  });

  const totalRev = state.logs.reduce((s,l)=>s+logRevenue(l),0);
  const totalCost = state.logs.reduce((s,l)=>s+logCost(l),0);
  const totalVol = state.logs.reduce((s,l)=>s+Number(l.volume||0),0);
  const totalProfit = totalRev - totalCost;
  const profitPct = totalRev > 0 ? (totalProfit / totalRev) * 100 : 0;

  const daysCount = Object.keys(byDay).length;
  const monthsCount = Object.keys(byMonth).length;
  const avgPerDay = daysCount > 0 ? totalProfit / daysCount : 0;
  const avgPerMonth = monthsCount > 0 ? totalProfit / monthsCount : 0;

  // find worst and best days
  const dayEntries = Object.entries(byDay).map(([d,v])=>({date:d, profit:v.rev-v.cost, ...v}));
  const worstDay = dayEntries.length ? dayEntries.reduce((a,b)=>a.profit<b.profit?a:b) : null;
  const bestDay = dayEntries.length ? dayEntries.reduce((a,b)=>a.profit>b.profit?a:b) : null;

  const dayRows = dayEntries.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(d=>`
    <tr>
      <td>${d.date}</td>
      <td class="num">${fmt(d.vol)}</td>
      <td class="num">${fmt(d.rev)}</td>
      <td class="num">${fmt(d.cost)}</td>
      <td class="num" style="color:${d.profit>=0?'var(--green)':'var(--red)'};font-weight:700">${fmt(d.profit)}</td>
      <td class="num" style="color:${d.profit>=0?'var(--green)':'var(--red)'}">${d.rev>0?fmt((d.profit/d.rev)*100)+'%':'-'}</td>
    </tr>
  `).join('') || `<tr><td colspan="6" style="color:var(--text-dim);text-align:center">ยังไม่มีข้อมูลบันทึกงาน</td></tr>`;

  const monthRows = Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,v])=>{
    const profit = v.rev - v.cost;
    return `<tr>
      <td>${m}</td>
      <td class="num">${fmt(v.vol)}</td>
      <td class="num">${fmt(v.rev)}</td>
      <td class="num">${fmt(v.cost)}</td>
      <td class="num" style="color:${profit>=0?'var(--green)':'var(--red)'};font-weight:700">${fmt(profit)}</td>
      <td class="num" style="color:${profit>=0?'var(--green)':'var(--red)'}">${v.rev>0?fmt((profit/v.rev)*100)+'%':'-'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" style="color:var(--text-dim);text-align:center">ยังไม่มีข้อมูลบันทึกงาน</td></tr>`;

  return `
    <div class="section-title" style="margin-top:0">📊 ภาพรวมสะสม</div>
    <div class="grid3" style="margin-bottom:16px">
      <div class="card revenue"><div class="big">${fmt(totalRev)}</div><div class="label">รายได้รวม (บาท)</div></div>
      <div class="card cost"><div class="big">${fmt(totalCost)}</div><div class="label">ต้นทุนรวม (บาท)</div></div>
      <div class="card ${totalProfit>=0?'profit':'loss'}">
        <div class="big">${fmt(totalProfit)}</div>
        <div class="label">${totalProfit>=0?'กำไรสุทธิ':'ขาดทุนสุทธิ'} — ${totalProfit>=0?'+':''}${fmt(profitPct)}%</div>
      </div>
    </div>

    <div class="section-title">⏱ เฉลี่ยกำไร/ขาดทุน</div>
    <div class="grid3" style="margin-bottom:16px">
      <div class="card ${avgPerDay>=0?'profit':'loss'}">
        <div class="big">${fmt(avgPerDay)}</div>
        <div class="label">${avgPerDay>=0?'กำไร':'ขาดทุน'}เฉลี่ย/วัน (จาก ${daysCount} วัน)</div>
      </div>
      <div class="card ${avgPerMonth>=0?'profit':'loss'}">
        <div class="big">${fmt(avgPerMonth)}</div>
        <div class="label">${avgPerMonth>=0?'กำไร':'ขาดทุน'}เฉลี่ย/เดือน (จาก ${monthsCount} เดือน)</div>
      </div>
      <div class="card"><div class="big" style="color:var(--yellow)">${fmt(totalVol)}</div><div class="label">จำนวนงานที่ทำได้รวม (unit)</div></div>
    </div>

    ${worstDay || bestDay ? `
    <div class="section-title">🔴 วันที่ทำงานเด่น</div>
    <div class="grid3" style="margin-bottom:16px">
      ${bestDay ? `<div class="card profit"><div class="big">${fmt(bestDay.profit)}</div><div class="label">วันที่กำไรสูงสุด: ${bestDay.date}</div></div>` : ''}
      ${worstDay ? `<div class="card loss"><div class="big">${fmt(worstDay.profit)}</div><div class="label">วันที่ขาดทุนหนักสุด: ${worstDay.date}</div></div>` : ''}
    </div>` : ''}

    <table>
      <thead><tr><th>วันที่</th><th class="num">จำนวนงาน</th><th class="num">รายได้</th><th class="num">ต้นทุน</th><th class="num">กำไร/ขาดทุน</th><th class="num">%</th></tr></thead>

      <tbody>${monthRows}</tbody>
    </table>

    <div class="hint" style="margin-top:14px;padding:10px;background:var(--panel-2);border-radius:8px;border-left:3px solid var(--blue)">
      💡 ตัวเลขในหน้านี้ดึงจากบันทึกงานประจำวันทั้งหมดที่บันทึกไว้ ยิ่งบันทึกทุกวันสม่ำเสมอ ตัวเลขจะยิ่งสะท้อนความเป็นจริงได้แม่นยำ

function renderLog(){
  const actOptions = state.activities.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  const logDateFilter = state.logHistoryDateFilter || 'all';
  const filteredLogs = logDateFilter === 'all' ? state.logs : state.logs.filter(l=>l.date === logDateFilter);
  const availableLogDates = [...new Set(state.logs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a));
  const logDateOptions = `<option value="all" ${logDateFilter==='all'?'selected':''}>ทั้งหมดทุกวัน</option>` +
    availableLogDates.map(d=>`<option value="${d}" ${logDateFilter===d?'selected':''}>${d}</option>`).join('');

  const rows = [...filteredLogs].sort((a,b)=> b.date.localeCompare(a.date) || (a.round||0)-(b.round||0)).map(l=>{
    const act = state.activities.find(a=>a.id===l.activityId);
    const rev = logRevenue(l), cost = logCost(l), profit = logProfit(l);
    const hoursUsed = logHours(l);
    const hUsedH = Math.floor(hoursUsed);
    const hUsedM = Math.round((hoursUsed - hUsedH) * 60);
    const isActual = Number(l.actualHours) > 0;
    return `
    <tr>
      <td>${l.date}${l.roundLabel ? ` <span style="color:var(--text-dim)">(${l.roundLabel})</span>` : ''}</td>
      <td>${act ? act.name : '-'}</td>
      <td class="num">${l.regularWorkers||0}</td>
      <td class="num">${l.tempWorkers||0}</td>
      <td class="num">${l.volume}</td>
      <td class="num">${hUsedH} ชม. ${hUsedM} นาที${isActual?' (จริง)':' (มาตรฐาน)'}</td>
      <td class="num">${l.otHoursRegular||0}/${l.otHoursTemp||0}</td>
      <td class="num">${fmt(rev)}</td>
      <td class="num">${fmt(cost)}</td>
      <td class="num">${fmt(logCostPerUnit(l))}</td>
      <td class="num">${fmt(logCostPerPersonHour(l))}</td>
      <td class="num">${fmt(logProductivity(l))}</td>
      <td class="num" style="color:${profit>=0?'var(--green)':'var(--red)'}">${fmt(profit)}</td>
      <td><button class="danger ghost" data-del-log="${l.id}">ลบ</button></td>
    </tr>`;
  }).join('');

  return `
    <h3>เพิ่มบันทึกงาน (แยกคนประจำ/Temp เพราะค่าแรงไม่เท่ากัน)</h3>
    <div class="hint" style="margin-bottom:10px">ทำงานหลายรอบในวันเดียวกัน กิจกรรมเดียวกัน? บันทึกแยกทีละรอบได้เลย กด "บันทึก" แล้วกรอกรอบถัดไปต่อได้ทันที (วันที่/กิจกรรมจะค้างไว้ให้)</div>
    <div class="row">
      <input id="l-date" type="date" value="${state.lastLogDate || todayStr()}">
      <select id="l-activity">${state.activities.map(a=>`<option value="${a.id}" ${state.lastLogActivity===a.id?'selected':''}>${a.name}</option>`).join('')}</select>
      <div><div class="hint" style="margin-bottom:3px">จำนวนงานที่ได้ (unit)</div><input id="l-volume" type="number" style="width:150px"></div>
    </div>
    <div class="row">
      <div><div class="hint" style="margin-bottom:3px">ป้ายกำกับรอบ (ไม่บังคับ เช่น "เช้า", "รอบ 1")</div><input id="l-round-label" type="text" placeholder="เช่น เช้า, รอบ 1" style="width:220px"></div>
    </div>
    <div class="hint" id="l-time-preview" style="margin-bottom:8px;color:var(--teal)"></div>
    <div class="row">
      <div><div class="hint" style="margin-bottom:3px">จำนวนคนประจำ</div><input id="l-regular-workers" type="number" value="0" style="width:120px"></div>
      <div><div class="hint" style="margin-bottom:3px">OT คนประจำ (ชม./คน)</div><input id="l-ot-regular" type="number" step="0.5" value="0" style="width:150px"></div>
    </div>
    <div class="row">
      <div><div class="hint" style="margin-bottom:3px">จำนวนคน Temp</div><input id="l-temp-workers" type="number" value="0" style="width:120px"></div>
      <div><div class="hint" style="margin-bottom:3px">เกินเวลา Temp (ชม./คน)</div><input id="l-ot-temp" type="number" step="0.5" value="0" style="width:170px"></div>
    </div>
    <div class="row">
      <div><div class="hint" style="margin-bottom:3px">คนแผนกอื่นเสริม (คิดต้นทุนที่อัตราเดียวกับพนักงานประจำ)</div><input id="l-other-workers" type="number" value="0" style="width:150px"></div>
    </div>
    <div class="row">
      <div><div class="hint" style="margin-bottom:3px">ชั่วโมงทำงานจริง (ไม่บังคับ — ถ้าไม่กรอกจะใช้เวลามาตรฐาน)</div><input id="l-actual-hours" type="number" step="1" min="0" placeholder="ชม." style="width:100px"></div>
      <div><div class="hint" style="margin-bottom:3px">+ นาที</div><input id="l-actual-minutes" type="number" step="1" min="0" max="59" placeholder="นาที" style="width:100px"></div>
    </div>
    <button id="add-log">บันทึกรอบนี้ และคำนวณต้นทุน</button>

    <div class="section-title">ประวัติบันทึกงาน (แต่ละแถว = 1 รอบ)</div>
    <div class="row" style="margin-bottom:10px">
      <div><div class="hint" style="margin-bottom:3px">ดูเฉพาะวันที่</div>
        <select id="log-date-filter">${logDateOptions}</select>
      </div>
    </div>
    ${filteredLogs.length ? `
    <table>
      <thead><tr><th>วันที่</th><th>กิจกรรม</th><th class="num">ประจำ</th><th class="num">Temp</th><th class="num">งานที่ได้</th><th class="num">ชม.ที่ใช้คำนวณ</th><th class="num">OT ประจำ/Temp</th><th class="num">รายได้</th><th class="num">ต้นทุน</th><th class="num">ต้นทุน/ชิ้น</th><th class="num">ต้นทุน/คน/ชม.</th><th class="num">Productivity (ชิ้น/คน-ชม.)</th><th class="num">กำไร/ขาดทุน</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` : `<div class="empty">${state.logs.length ? 'ไม่มีบันทึกงานในวันที่เลือก' : 'ยังไม่มีบันทึกงาน — เพิ่มรายการแรกด้านบน'}</div>`}
    <div class="hint">ถ้ากรอก "ชั่วโมงทำงานจริง" ระบบจะใช้เลขนั้นคำนวณต้นทุนแทนเวลามาตรฐาน — Productivity = จำนวนงาน ÷ (ชั่วโมงที่ใช้ × จำนวนคนรวม) ยิ่งสูงยิ่งทำงานได้เร็ว/คุ้มค่าแรงกว่ามาตรฐาน ทำงานหลายรอบในวันเดียวกัน หน้า "สรุปตามกิจกรรม" จะรวมทุกรอบของกิจกรรมนั้นในวันเดียวกันให้อัตโนมัติ</div>
  `;
}

function renderRateCard(){
  const rows = state.activities.map(a=>{
    const total = a.price * a.monthlyVolume;
    return `
    <tr>
      <td>${a.name}</td>
      <td>THB/Unit</td>
      <td class="num"><input type="number" step="0.1" value="${a.price}" data-rc-price="${a.id}" style="width:80px"></td>
      <td class="num"><input type="number" value="${a.monthlyVolume||0}" data-rc-volume="${a.id}" style="width:100px"></td>
      <td class="num">${fmt(total)}</td>
    </tr>`;
  }).join('');
  const processTotal = state.activities.reduce((s,a)=> s + a.price*(a.monthlyVolume||0), 0);

  const st = state.storage;
  const storageTotal = st.price * st.volume * st.days;

  const fixedCost = staffCalc().grandTotal;
  const grandRevenue = processTotal + storageTotal;
  const profit = grandRevenue - fixedCost;

  return `
    <h3>รวม 5 Process (ไม่รวม Storage)</h3>
    <table>
      <thead><tr><th>บริการ / Process</th><th>UOM</th><th class="num">ราคา/ชิ้น</th><th class="num">Volume/เดือน</th><th class="num">ราคารวม</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="4" style="text-align:right;font-weight:700;color:var(--yellow)">ราคาทั้งหมด</td><td class="num" style="font-weight:700;color:var(--yellow)">${fmt(processTotal)}</td></tr></tfoot>
    </table>

    <div class="section-title">Storage</div>
    <table>
      <thead><tr><th>บริการ</th><th>UOM</th><th class="num">ราคา/ชิ้น/วัน</th><th class="num">Volume/เดือน (จำนวนชิ้นเฉลี่ย)</th><th class="num">จำนวนวันจัดเก็บ</th><th class="num">ราคารวม</th></tr></thead>
      <tbody>
        <tr>
          <td>Storage — ค่าจัดเก็บ</td>
          <td>THB/Unit/Day</td>
          <td class="num"><input type="number" step="0.01" value="${st.price}" data-storage="price" style="width:80px"></td>
          <td class="num"><input type="number" value="${st.volume}" data-storage="volume" style="width:100px"></td>
          <td class="num"><input type="number" value="${st.days}" data-storage="days" style="width:80px"></td>
          <td class="num">${fmt(storageTotal)}</td>
        </tr>
      </tbody>
      <tfoot><tr><td colspan="5" style="text-align:right;font-weight:700;color:var(--yellow)">ราคาทั้งหมด</td><td class="num" style="font-weight:700;color:var(--yellow)">${fmt(storageTotal)}</td></tr></tfoot>
    </table>

    <div class="grid3" style="margin-top:20px">
      <div class="card revenue"><div class="big">${fmt(grandRevenue)}</div><div class="label">รายได้รวม/เดือน (Process + Storage)</div></div>
      <div class="card cost"><div class="big">${fmt(fixedCost)}</div><div class="label">ต้นทุนคงที่/เดือน (จากหน้าต้นทุนพนักงาน)</div></div>
      <div class="card ${profit>=0?'profit':'loss'}"><div class="big">${fmt(profit)}</div><div class="label">${profit>=0?'กำไร':'ขาดทุน'} (บาท)</div></div>
    </div>
    <div class="hint">แก้ "Volume/เดือน" ของแต่ละกิจกรรม หรือราคา/จำนวนวันของ Storage ได้ตรงนี้เลย ใช้สำหรับสรุปคิดราคาลูกค้าตอนสิ้นเดือน — ต้นทุนคงที่ดึงมาจากหน้า "ต้นทุนพนักงาน" อัตโนมัติ</div>
  `;
}

function renderActivityBreakdown(){
  const actName = id => { const a = state.activities.find(x=>x.id===id); return a ? a.name : '-'; };

  // build a table body that lists each round, grouped by period (date or month) then by activity,
  // followed by a subtotal row for that activity within that period
  function buildGroupedRows(periodKeyFn, logsSource){
    // periodKeyFn(log) -> period string (date or month)
    const periods = {}; // period -> activityId -> [logs]
    (logsSource || state.logs).forEach(l=>{
      const p = periodKeyFn(l);
      periods[p] = periods[p] || {};
      periods[p][l.activityId] = periods[p][l.activityId] || [];
      periods[p][l.activityId].push(l);
    });

    const periodKeys = Object.keys(periods).sort((a,b)=>b.localeCompare(a));
    let html = '';
    periodKeys.forEach(period=>{
      const actIds = Object.keys(periods[period]).sort((a,b)=>actName(a).localeCompare(actName(b)));
      actIds.forEach(actId=>{
        const roundLogs = periods[period][actId];
        roundLogs.forEach((l,i)=>{
          const rev = logRevenue(l), cost = logCost(l), vol = Number(l.volume||0);
          const label = l.roundLabel ? l.roundLabel : `รอบ ${i+1}`;
          const otherStr = Number(l.otherWorkers||0) > 0 ? `+${l.otherWorkers} อื่นๆ` : '';
          html += `<tr>
            <td>${i===0 ? period : ''}</td>
            <td style="padding-left:18px;color:var(--text-dim)">${actName(actId)} — ${label}</td>
            <td class="num">${fmt(vol)}</td>
            <td class="num">${l.regularWorkers||0}+${l.tempWorkers||0}${otherStr}</td>
            <td class="num">${fmt(Number(l.otHoursRegular||0)+Number(l.otHoursTemp||0))}</td>
            <td class="num">${fmt(logCostPerUnit(l))}</td>
            <td class="num">${fmt(logProductivity(l))}</td>
            <td class="num">${fmt(rev)}</td>
            <td class="num">${fmt(cost)}</td>
            <td class="num" style="color:${rev-cost>=0?'var(--green)':'var(--red)'}">${fmt(rev-cost)}</td>
          </tr>`;
        });
        // subtotal for this activity within this period
        const totalVol = roundLogs.reduce((s,l)=>s+Number(l.volume||0),0);
        const totalRev = roundLogs.reduce((s,l)=>s+logRevenue(l),0);
        const totalCost = roundLogs.reduce((s,l)=>s+logCost(l),0);
        const totalOt = roundLogs.reduce((s,l)=>s+Number(l.otHoursRegular||0)+Number(l.otHoursTemp||0),0);
        const maxReg = Math.max(...roundLogs.map(l=>Number(l.regularWorkers||0)));
        const maxTemp = Math.max(...roundLogs.map(l=>Number(l.tempWorkers||0)));
        const maxOther = Math.max(...roundLogs.map(l=>Number(l.otherWorkers||0)));
        const suggested = maxReg + maxTemp + maxOther;
        const costPerUnit = totalVol > 0 ? totalCost/totalVol : 0;
        const profit = totalRev - totalCost;
        const hcKey = period + '|' + actId;
        const manual = state.manualHeadcounts[hcKey] || {};
        const mReg = manual.regular !== undefined ? manual.regular : '';
        const mTemp = manual.temp !== undefined ? manual.temp : '';
        const mOther = manual.other !== undefined ? manual.other : '';
        html += `<tr style="background:var(--panel-2);font-weight:700">
          <td></td>
          <td style="color:var(--blue)">รวม ${actName(actId)} (${roundLogs.length} รอบ)</td>
          <td class="num" style="color:var(--blue)">${fmt(totalVol)}</td>
          <td class="num" style="color:var(--blue)">
            <span class="hc-group" title="ประจำ + Temp + แผนกอื่น">
              <span class="hc-cell"><span class="hc-label">ประจำ</span><input type="number" data-hc-key="${hcKey}" data-hc-field="regular" value="${mReg}" placeholder="${maxReg}"></span>
              <span class="hc-sep">+</span>
              <span class="hc-cell"><span class="hc-label">Temp</span><input type="number" data-hc-key="${hcKey}" data-hc-field="temp" value="${mTemp}" placeholder="${maxTemp}"></span>
              <span class="hc-sep">+</span>
              <span class="hc-cell"><span class="hc-label">อื่นๆ</span><input type="number" data-hc-key="${hcKey}" data-hc-field="other" value="${mOther}" placeholder="${maxOther}"></span>
            </span>
          </td>
          <td class="num" style="color:var(--blue)">${fmt(totalOt)}</td>
          <td class="num" style="color:var(--blue)">${fmt(costPerUnit)}</td>
          <td class="num">-</td>
          <td class="num" style="color:var(--blue)">${fmt(totalRev)}</td>
          <td class="num" style="color:var(--blue)">${fmt(totalCost)}</td>
          <td class="num" style="color:${profit>=0?'var(--green)':'var(--red)'}">${fmt(profit)}</td>
        </tr>`;
      });
    });
    return html || `<tr><td colspan="10" style="color:var(--text-dim)">ไม่มีข้อมูล</td></tr>`;
  }

  const selectedDate = state.activityBreakdownDate || 'all';
  const dayLogsFiltered = selectedDate === 'all' ? state.logs : state.logs.filter(l=>l.date === selectedDate);
  const dayBody = buildGroupedRows(l=>l.date, dayLogsFiltered);

  const selectedMonth = state.activityBreakdownMonth || 'all';
  const monthLogsFiltered = selectedMonth === 'all' ? state.logs : state.logs.filter(l=>l.date.slice(0,7) === selectedMonth);
  const monthBody = buildGroupedRows(l=>l.date.slice(0,7), monthLogsFiltered);

  const availableDates = [...new Set(state.logs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a));

    availableDates.map(d=>`<option value="${d}" ${selectedDate===d?'selected':''}>${d}</option>`).join('');

  const availableMonths = [...new Set(state.logs.map(l=>l.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
  const monthOptions = `<option value="all" ${selectedMonth==='all'?'selected':''}>ทั้งหมดทุกเดือน</option>` +
    availableMonths.map(m=>`<option value="${m}" ${selectedMonth===m?'selected':''}>${m}</option>`).join('');

  const headRow = `<tr><th>วันที่/เดือน</th><th>กิจกรรม / รอบ</th><th class="num">จำนวนงาน</th><th class="num">คน (ประจำ+Temp)</th><th class="num">OT (ชม.)</th><th class="num">ต้นทุน/ชิ้น</th><th class="num">Productivity (ชิ้น/คน-ชม.)</th><th class="num">รายได้</th><th class="num">ต้นทุน</th><th class="num">กำไร/ขาดทุน</th></tr>`;

  const grandTotalRow = (logsSource) => {
    const src = logsSource || state.logs;
    const totalRev = src.reduce((s,l)=>s+logRevenue(l),0);
    const totalCost = src.reduce((s,l)=>s+logCost(l),0);
    const totalOt = src.reduce((s,l)=>s+Number(l.otHoursRegular||0)+Number(l.otHoursTemp||0),0);

    return `<tr style="font-weight:700">
      <td colspan="2" style="color:var(--yellow)">รวมทั้งหมด</td>
      <td class="num">-</td>
      <td class="num">-</td>
      <td class="num" style="color:var(--yellow)">${fmt(totalOt)}</td>

      <td class="num" style="color:${totalProfit>=0?'var(--green)':'var(--red)'}">${fmt(totalProfit)}</td>
    </tr>`;
  };

  return `
    <h3>สรุปแยกตามกิจกรรม — รายวัน (แสดงทีละรอบ + รวมต่อกิจกรรม)</h3>
    <div class="row" style="margin-bottom:14px">
      <div><div class="hint" style="margin-bottom:3px">ดูเฉพาะวันที่</div>
        <select id="activity-date-filter">${dateOptions}</select>
      </div>
    </div>
    <table>
      <thead>${headRow}</thead>
      <tbody>${dayBody}</tbody>
      <tfoot>${grandTotalRow(dayLogsFiltered)}</tfoot>
    </table>

    <div class="section-title">สรุปแยกตามกิจกรรม — รายเดือน (แสดงทีละรอบ + รวมต่อกิจกรรม)</div>
    <div class="row" style="margin-bottom:14px">
      <div><div class="hint" style="margin-bottom:3px">ดูเฉพาะเดือน</div>
        <select id="activity-month-filter">${monthOptions}</select>
      </div>
    </div>
    <table>
      <thead>${headRow}</thead>
      <tbody>${monthBody}</tbody>
      <tfoot>${grandTotalRow(monthLogsFiltered)}</tfoot>
    </table>
    <div class="hint">แต่ละแถวสีเทาคือ 1 รอบที่บันทึกไว้ แถวสีน้ำเงินคือยอดรวมของกิจกรรมนั้นในวัน/เดือนนั้น (คน ใช้ค่าสูงสุดของแต่ละรอบ ไม่ใช่บวกกัน) แถวเหลืองล่างสุดคือยอดรวมทั้งหมดในตาราง — เอายอด "จำนวนงาน" รวมไปกรอกในช่อง "Volume/เดือน" ของหน้า Rate Card ได้เลย</div>
  `;

function updateTimePreview(){
  const preview = document.getElementById('l-time-preview');
  if(!preview) return;
  const activityId = document.getElementById('l-activity').value;
  const volume = Number(document.getElementById('l-volume').value) || 0;
  const act = state.activities.find(a=>a.id===activityId);
  if(!act || !volume){ preview.textContent = ''; return; }

  const regEl = document.getElementById('l-regular-workers');
  const tempEl = document.getElementById('l-temp-workers');
  const actualWorkers = (Number(regEl && regEl.value) || 0) + (Number(tempEl && tempEl.value) || 0);

  // man-minutes per unit is a constant amount of work, independent of how many people split it
  const manMinutesPerUnit = act.minutesPerUnit * act.standardWorkers;
  const totalManMinutes = manMinutesPerUnit * volume;

  if(actualWorkers > 0){
    const actualMinutes = totalManMinutes / actualWorkers;
    const hours = Math.floor(actualMinutes/60);
    const mins = Math.round(actualMinutes%60);
    preview.textContent = `งานทั้งหมด ${fmt(totalManMinutes)} คน-นาที (${act.minutesPerUnit} นาที/ชิ้น × ${act.standardWorkers} คนมาตรฐาน × ${volume} ชิ้น) ÷ ${actualWorkers} คนที่ใช้จริง ≈ ${hours} ชม. ${mins} นาที — เทียบกับเวลาที่ทำงานจริงเพื่อเช็คว่าเร็ว/ช้ากว่ามาตรฐาน`;
  } else {
    const stdMinutes = totalManMinutes / act.standardWorkers;
    const hours = Math.floor(stdMinutes/60);
    const mins = Math.round(stdMinutes%60);
    preview.textContent = `งานทั้งหมด ${fmt(totalManMinutes)} คน-นาที — กรอกจำนวนคนด้านล่างเพื่อดูเวลาที่ควรใช้จริง (ที่คนมาตรฐาน ${act.standardWorkers} คน จะใช้ ≈ ${hours} ชม. ${mins} นาที)`;
  }
}

function exportToExcel(){
  if(typeof XLSX === 'undefined'){ showToast('โหลดไลบรารี Excel ไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  const wb = XLSX.utils.book_new();

  // 1. ตั้งค่ากิจกรรม
  const pricingRows = state.activities.map(a=>({
    'กิจกรรม': a.name, 'ราคาขาย/Unit': a.price, 'คนมาตรฐาน': a.standardWorkers,
    'เวลา/Unit (นาที)': a.minutesPerUnit, 'ต้นทุน/Unit (มาตรฐาน)': unitLaborCost(a, a.standardWorkers)
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pricingRows), 'ตั้งค่ากิจกรรม');

  // 2. ต้นทุนพนักงาน (fixed)
  const c = staffCalc();
  const staffRows = [
    {'รายการ':'พนักงานประจำ - จำนวนคน','ค่า': state.staffCost.regularCount},
    {'รายการ':'พนักงานประจำ - เงินเดือน/คน','ค่า': state.staffCost.regularSalary},
    {'รายการ':'พนักงานประจำ - รวม','ค่า': c.regularTotal},
    {'รายการ':'พนักงาน Temp - จำนวนคน','ค่า': state.staffCost.tempCount},
    {'รายการ':'พนักงาน Temp - ค่าจ้าง/คน','ค่า': state.staffCost.tempWage},
    {'รายการ':'พนักงาน Temp - รวม','ค่า': c.tempTotal},
    {'รายการ':'OT พนักงานประจำ - รวม','ค่า': c.regularOtTotal},
    {'รายการ':'ค่าล่วงเวลา Temp - รวม','ค่า': c.tempExtraTotal},
    {'รายการ':'รวมค่าพนักงานทั้งหมด/เดือน','ค่า': c.grandTotal},
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(staffRows), 'ต้นทุนพนักงาน');

  // 3. บันทึกงานประจำวัน (raw log, ทีละรอบ)
  const logRows = [...state.logs].sort((a,b)=>a.date.localeCompare(b.date)).map(l=>{
    const act = state.activities.find(a=>a.id===l.activityId);
    const hoursUsed = logHours(l);
    return {
      'วันที่': l.date, 'ป้ายรอบ': l.roundLabel||'', 'กิจกรรม': act?act.name:'-',
      'คนประจำ': l.regularWorkers||0, 'คนTemp': l.tempWorkers||0, 'คนแผนกอื่น': l.otherWorkers||0,
      'จำนวนงาน': l.volume, 'ชั่วโมงที่ใช้คำนวณ': Number(hoursUsed.toFixed(2)),
      'OT ประจำ (ชม./คน)': l.otHoursRegular||0, 'OT Temp (ชม./คน)': l.otHoursTemp||0,
      'รายได้': Number(logRevenue(l).toFixed(2)), 'ต้นทุน': Number(logCost(l).toFixed(2)),
      'ต้นทุน/ชิ้น': Number(logCostPerUnit(l).toFixed(2)), 'ต้นทุน/คน/ชม.': Number(logCostPerPersonHour(l).toFixed(2)),
      'Productivity (ชิ้น/คน-ชม.)': Number(logProductivity(l).toFixed(2)),
      'กำไร/ขาดทุน': Number(logProfit(l).toFixed(2))
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(logRows), 'บันทึกงานประจำวัน');

  // 4. สรุปตามกิจกรรม - รายวัน & รายเดือน (subtotal per activity per period)
  function buildSummaryRows(periodKeyFn){
    const periods = {};
    state.logs.forEach(l=>{
      const p = periodKeyFn(l);
      periods[p] = periods[p] || {};
      periods[p][l.activityId] = periods[p][l.activityId] || [];
      periods[p][l.activityId].push(l);
    });
    const rows = [];
    Object.keys(periods).sort().forEach(period=>{
      Object.keys(periods[period]).forEach(actId=>{
        const act = state.activities.find(a=>a.id===actId);
        const roundLogs = periods[period][actId];
        const totalVol = roundLogs.reduce((s,l)=>s+Number(l.volume||0),0);
        const totalRev = roundLogs.reduce((s,l)=>s+logRevenue(l),0);
        const totalCost = roundLogs.reduce((s,l)=>s+logCost(l),0);
        rows.push({
          'ช่วงเวลา': period, 'กิจกรรม': act?act.name:'-', 'จำนวนรอบ': roundLogs.length,
          'จำนวนงานรวม': totalVol, 'รายได้รวม': Number(totalRev.toFixed(2)),
          'ต้นทุนรวม': Number(totalCost.toFixed(2)), 'กำไร/ขาดทุน': Number((totalRev-totalCost).toFixed(2))
        });
      });
    });
    return rows;
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(l=>l.date)), 'สรุปกิจกรรม-รายวัน');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(l=>l.date.slice(0,7))), 'สรุปกิจกรรม-รายเดือน');

  // 5. Rate Card
  const rcRows = state.activities.map(a=>({
    'บริการ': a.name, 'UOM':'THB/Unit', 'ราคา/ชิ้น': a.price, 'Volume/เดือน': a.monthlyVolume||0,
    'ราคารวม': Number((a.price*(a.monthlyVolume||0)).toFixed(2))
  }));
  rcRows.push({'บริการ':'Storage - ค่าจัดเก็บ','UOM':'THB/Unit/Day','ราคา/ชิ้น':state.storage.price,'Volume/เดือน':state.storage.volume,'ราคารวม': Number((state.storage.price*state.storage.volume*state.storage.days).toFixed(2))});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rcRows), 'Rate Card');

  const filename = `warehouse-cost-${todayStr()}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('ดาวน์โหลดไฟล์ Excel แล้ว');
}

      tooltip: {
        backgroundColor: chartTheme.tooltip,
        titleColor: chartTheme.color, bodyColor: chartTheme.color,
        borderColor: '#383E4A', borderWidth: 1, padding: 10,
        callbacks: { label: (ctx)=> `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} บาท` }
      }
    },
    scales: {
      x: { grid: { color: chartTheme.grid }, ticks: { font:{size:11} } },
      y: { grid: { color: chartTheme.grid }, ticks: { callback: (v)=>fmt(v), font:{size:11} } }
    }
  };

  function makeDataset(entries){
    const labels = entries.map(([k])=>k);
    const revenue = entries.map(([,v])=>v.rev);
    const cost = entries.map(([,v])=>v.cost);
    const profit = entries.map(([,v])=>v.rev-v.cost);
    return { labels, revenue, cost, profit };
  }

  const daily = makeDataset(dayEntries);
  const monthly = makeDataset(monthEntries);

  const buildDatasets = (d) => [
    { label:'รายได้', data:d.revenue, borderColor:'#4FD1C5', backgroundColor:'rgba(79,209,197,0.1)', borderWidth:2, tension:0.3, fill:false, pointRadius:3, pointHoverRadius:6 },
    { label:'ต้นทุน', data:d.cost, borderColor:'#F0776B', backgroundColor:'rgba(240,119,107,0.1)', borderWidth:2, tension:0.3, fill:false, pointRadius:3, pointHoverRadius:6 },
    { label:'กำไร/ขาดทุน', data:d.profit, borderColor:'#F4C94E', backgroundColor:'rgba(244,201,78,0.15)', borderWidth:3, tension:0.3, fill:true, pointRadius:4, pointHoverRadius:7 },
  ];

  dashboardCharts.daily = new Chart(dailyCanvas, {
    type:'line',
    data: { labels: daily.labels, datasets: buildDatasets(daily) },
    options: commonOptions
  });

  dashboardCharts.monthly = new Chart(monthlyCanvas, {
    type:'line',
    data: { labels: monthly.labels, datasets: buildDatasets(monthly) },
    options: commonOptions
  });
}

function attachHandlers(){
  const dateFilter = document.getElementById('activity-date-filter');
  if(dateFilter) dateFilter.onchange = ()=>{
    state.activityBreakdownDate = dateFilter.value;
    render();
  };

  const monthFilter = document.getElementById('activity-month-filter');
  if(monthFilter) monthFilter.onchange = ()=>{
    state.activityBreakdownMonth = monthFilter.value;
    render();
  };

  const logDateFilter = document.getElementById('log-date-filter');
  if(logDateFilter) logDateFilter.onchange = ()=>{
    state.logHistoryDateFilter = logDateFilter.value;
    render();
  };

  const exportBtn = document.getElementById('export-excel');
  if(exportBtn) exportBtn.onclick = exportToExcel;

  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.onclick = ()=>{ state.tab = el.dataset.tab; render(); };
  });


  document.querySelectorAll('[data-hc-key]').forEach(el=>{
    el.onchange = async ()=>{
      const key = el.dataset.hcKey;
      const field = el.dataset.hcField;
      state.manualHeadcounts[key] = state.manualHeadcounts[key] || {};
      if(el.value === ''){ delete state.manualHeadcounts[key][field]; }
      else { state.manualHeadcounts[key][field] = Number(el.value)||0; }
      if(Object.keys(state.manualHeadcounts[key]).length === 0) delete state.manualHeadcounts[key];
      try{
        const hc = state.manualHeadcounts[key] || {};
        await sb.from('manual_headcounts').upsert({ key, regular: hc.regular ?? null, temp: hc.temp ?? null, other: hc.other ?? null });
        showToast('บันทึกจำนวนคนแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-field]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.id);
      if(!act) return;
      act[el.dataset.field] = Number(el.value)||0;
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดตแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-rc-price]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.rcPrice);
      if(!act) return;
      act.price = Number(el.value)||0;
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดตราคา/ชิ้นแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });
  document.querySelectorAll('[data-rc-volume]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.rcVolume);
      if(!act) return;
      act.monthlyVolume = Number(el.value)||0;
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดต Volume แล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });
  document.querySelectorAll('[data-storage]').forEach(el=>{
    el.onchange = async ()=>{
      state.storage[el.dataset.storage] = Number(el.value)||0;
      try{
        await sb.from('storage_settings').update({ price: state.storage.price, volume: state.storage.volume, days: state.storage.days }).eq('id', 1);
        render(); showToast('อัปเดต Storage แล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-timesetting]').forEach(el=>{
    el.onchange = ()=>{
      state.timeSettings[el.dataset.timesetting] = Number(el.value)||0;
      render(); showToast('อัปเดตแล้ว (ค่าชั่วคราว ไม่ได้บันทึกถาวร)');
    };
  });

  const wageOverrideInput = document.querySelector('[data-wage-override]');
  if(wageOverrideInput) wageOverrideInput.onchange = ()=>{
    const v = wageOverrideInput.value;
    state.wageOverride = v === '' ? null : Number(v);
    render(); showToast('ตั้งค่าแรงเองแล้ว (ค่าชั่วคราว ไม่ได้บันทึกถาวร)');
  };
  const clearWageOverride = document.getElementById('clear-wage-override');
  if(clearWageOverride) clearWageOverride.onclick = ()=>{
    state.wageOverride = null;
    render(); showToast('กลับไปใช้ค่าคำนวณอัตโนมัติแล้ว');
  };

  document.querySelectorAll('[data-staff]').forEach(el=>{
    el.onchange = async ()=>{
      state.staffCost[el.dataset.staff] = Number(el.value)||0;
      try{
        await sb.from('staff_cost').update(staffCostToRow(state.staffCost)).eq('id', 1);
        render(); showToast('อัปเดตต้นทุนพนักงานแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  const addLog = document.getElementById('add-log');
  const lVolume = document.getElementById('l-volume');
  const lActivity = document.getElementById('l-activity');
  const lRegularWorkers = document.getElementById('l-regular-workers');
  const lTempWorkers = document.getElementById('l-temp-workers');
  if(lVolume) lVolume.oninput = updateTimePreview;
  if(lActivity) lActivity.onchange = updateTimePreview;
  if(lRegularWorkers) lRegularWorkers.oninput = updateTimePreview;
  if(lTempWorkers) lTempWorkers.oninput = updateTimePreview;
  if(lVolume || lActivity) updateTimePreview();
  if(addLog) addLog.onclick = async ()=>{
    const date = document.getElementById('l-date').value || todayStr();
    const activityId = document.getElementById('l-activity').value;
    const roundLabel = document.getElementById('l-round-label').value.trim();
    const volume = Number(document.getElementById('l-volume').value);
    const regularWorkers = Number(document.getElementById('l-regular-workers').value) || 0;
    const tempWorkers = Number(document.getElementById('l-temp-workers').value) || 0;
    const otherWorkers = Number(document.getElementById('l-other-workers').value) || 0;
    const otHoursRegular = Number(document.getElementById('l-ot-regular').value) || 0;
    const otHoursTemp = Number(document.getElementById('l-ot-temp').value) || 0;
    const actualHoursPart = Number(document.getElementById('l-actual-hours').value) || 0;
    const actualMinutesPart = Number(document.getElementById('l-actual-minutes').value) || 0;
    const actualHours = actualHoursPart + (actualMinutesPart/60);
    if(!volume || (!regularWorkers && !tempWorkers)){ showToast('กรอกจำนวนงานที่ได้ และคนอย่างน้อย 1 กลุ่มก่อน'); return; }
    const newLog = {id:uid(), date, activityId, roundLabel, volume, regularWorkers, tempWorkers, otherWorkers, otHoursRegular, otHoursTemp, actualHours};
    try{
      await sb.from('work_logs').insert(logToRow(newLog));
      state.logs.push(newLog);
      state.lastLogDate = date; state.lastLogActivity = activityId; // remember for next round's default
      render(); showToast('บันทึกรอบนี้แล้ว — กรอกรอบถัดไปต่อได้เลย');
    }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง'); }
  };
  document.querySelectorAll('[data-del-log]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.delLog;
      try{
        await sb.from('work_logs').delete().eq('id', id);
        state.logs = state.logs.filter(l=>l.id!==id);
        render();
      }catch(e){ console.error(e); showToast('ลบไม่สำเร็จ'); }
    };
  });

  // draw dashboard charts if on dashboard tab (use rAF to ensure canvas is in DOM)
  if(state.tab === 'dashboard'){
    requestAnimationFrame(()=>renderDashboardCharts());
  }
}

load();
</script>
</body>
</html>
