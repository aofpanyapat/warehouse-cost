function renderWorkforcePlan(){
  const shiftHours = Number(state.timeSettings.hoursPerDay) || 8;
  const bufferPct = Number(state.planSettings.bufferPct) || 0;

  if(!state.logs.length){
    return `
    <div class="section-title" style="margin-top:0">📅 วางแผนกำลังคน</div>
    <div class="hint" style="padding:14px;background:var(--panel-2);border-radius:8px">
      ยังไม่มีข้อมูลบันทึกงานประจำวันเลย — บันทึกงานสักระยะ (แนะนำอย่างน้อย 2-3 สัปดาห์) แล้วกลับมาดูหน้านี้อีกครั้ง ระบบจะบอกเองว่าควรเตรียมคนกี่คน
    </div>`;
  }

  const weekday = planByWeekday();
  const month = planByMonth();
  const overallRecommended = Math.max(...weekday.map(w=>w.recommended), 0);
  const currentTeam = state.staffCost.regularCount + state.staffCost.tempCount;
  const isEnough = overallRecommended <= currentTeam;

  // find the single heaviest day overall, for a plain-language highlight
  let heaviestMonth = null;
  month.forEach(m=>{ if(!heaviestMonth || m.peakHeadcount > heaviestMonth.peakHeadcount) heaviestMonth = m; });

  const weekdayCards = weekday.map(w=>{
    const hasData = w.samples > 0;
    const gap = w.recommended - currentTeam;
    const statusColor = !hasData ? 'var(--text-dim)' : gap > 0 ? 'var(--red)' : 'var(--green)';
    const statusText = !hasData ? 'ยังไม่มีข้อมูล' : gap > 0 ? `ขาด ${gap} คน` : 'มีคนพอ';
    return `
    <div class="card" style="min-width:0">
      <div class="label" style="margin-bottom:6px;font-weight:600">${w.label}</div>
      <div class="big" style="color:${hasData?'var(--yellow)':'var(--text-dim)'}">${hasData ? w.recommended : '-'}</div>
      <div class="label">คนที่ควรเตรียม</div>
      <div style="margin-top:8px;font-size:13px;color:${statusColor};font-weight:600">${statusText}</div>
    </div>`;
  }).join('');

  return `
    <div class="section-title" style="margin-top:0">📅 วางแผนกำลังคน</div>
    <div class="hint" style="padding:10px;background:var(--panel-2);border-radius:8px;border-left:3px solid var(--blue);margin-bottom:16px">
      ดูจากงานที่เคยทำมาก่อนหน้านี้ทั้งหมด แล้วบอกว่า "วันที่งานหนักที่สุด" ของแต่ละวันในสัปดาห์ ต้องใช้คนกี่คนถึงจะทำทัน (บวกเผื่อเหตุการณ์ไม่คาดคิดให้แล้ว)
    </div>

    <div class="grid3" style="margin-bottom:20px">
      <div class="card"><div class="big" style="color:var(--yellow)">${overallRecommended} คน</div><div class="label">ควรมีคนอย่างน้อยเท่านี้ เพื่อรับมือวันที่งานหนักสุด</div></div>
      <div class="card"><div class="big" style="color:var(--blue)">${currentTeam} คน</div><div class="label">คนที่มีอยู่ตอนนี้ (ประจำ + Temp รวมกัน)</div></div>
      <div class="card ${isEnough?'profit':'loss'}"><div class="big">${isEnough?'เพียงพอ ✓':`ขาด ${overallRecommended-currentTeam} คน`}</div><div class="label">สรุปผล</div></div>
    </div>

    <div class="section-title">👀 แต่ละวันในสัปดาห์ ควรเตรียมคนกี่คน</div>
    <div class="grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px">
      ${weekdayCards}
    </div>

    <div style="background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:20px;height:280px">
      <canvas id="chart-plan-weekday"></canvas>
    </div>

    ${heaviestMonth ? `
    <div class="section-title">📈 เดือนที่งานหนักที่สุดที่เคยเจอ</div>
    <div class="hint" style="padding:12px;background:var(--panel-2);border-radius:8px;margin-bottom:20px">
      เดือน <b style="color:var(--text)">${heaviestMonth.month}</b> — วันที่หนักที่สุดคือ <b style="color:var(--text)">${heaviestMonth.peakDate}</b> ซึ่งต้องใช้คนถึง <b style="color:var(--yellow)">${heaviestMonth.recommended} คน</b> ถึงจะทำทัน
    </div>` : ''}

    <div class="section-title">⚙️ ปรับค่า</div>
    <div class="row" style="margin-bottom:12px;align-items:flex-end">
      <div><div class="hint">ทำงานกี่ชั่วโมง/กะ</div><input type="number" step="0.5" value="${shiftHours}" data-timesetting="hoursPerDay" style="width:120px"></div>
      <div><div class="hint">เผื่อเหตุการณ์ไม่คาดคิด (%)</div><input type="number" step="1" value="${bufferPct}" data-plan="bufferPct" style="width:120px"></div>
    </div>
    <div class="hint" style="color:var(--text-2)">ยิ่งบันทึกงานประจำวันสม่ำเสมอนานเท่าไหร่ ตัวเลขในหน้านี้ยิ่งแม่นยำขึ้นเท่านั้น</div>
  `;
}


function renderSummary(){
  const daily = dailyRealSummary();   // real cost: actual headcount used per day × wage/hr × shift hours (+ OT)
  const monthly = monthlyRealSummary(); // same, rolled up by month

  const totalRev = daily.reduce((s,d)=>s+d.revenue,0);
  const totalCost = daily.reduce((s,d)=>s+d.laborCost,0);
  const totalProfit = totalRev - totalCost;
  const profitPct = totalRev > 0 ? (totalProfit / totalRev) * 100 : 0;

  const dayRows = daily.length ? daily.map(d=>`
    <tr><td>${d.date}</td><td class="num">${fmt(d.revenue)}</td><td class="num">${fmt(d.laborCost)}</td>
    <td class="num" style="color:${d.profit>=0?'var(--green)':'var(--red)'}">${fmt(d.profit)}</td></tr>
  `).join('') : `<tr><td colspan="4" style="color:var(--text-dim)">ไม่มีข้อมูล</td></tr>`;

  const monthRows = monthly.length ? monthly.map(m=>`
    <tr><td>${m.month}</td><td class="num">${fmt(m.revenue)}</td><td class="num">${fmt(m.laborCost)}</td>
    <td class="num" style="color:${m.profit>=0?'var(--green)':'var(--red)'}">${fmt(m.profit)}</td></tr>
  `).join('') : `<tr><td colspan="4" style="color:var(--text-dim)">ไม่มีข้อมูล</td></tr>`;

  return `
    <div class="grid3">
      <div class="card revenue"><div class="big">${fmt(totalRev)}</div><div class="label">รายได้รวม (บาท)</div></div>
      <div class="card cost"><div class="big">${fmt(totalCost)}</div><div class="label">ต้นทุนรวม — เงินจริงที่จ่ายค่าแรง (บาท)</div></div>
      <div class="card ${totalProfit>=0?'profit':'loss'}">
        <div class="big">${fmt(totalProfit)}</div>
        <div class="label">${totalProfit>=0?'กำไรสุทธิ':'ขาดทุนสุทธิ'} (บาท) — ${totalProfit>=0?'+':''}${fmt(profitPct)}%</div>
      </div>
    </div>
    <div class="hint" style="margin-bottom:16px">"ต้นทุนรวม" คือ<b>เงินจริงที่ต้องจ่าย</b>ค่าแรง (คนที่ใช้จริงในแต่ละวัน × ค่าแรง/ชม. × ชั่วโมงทำงาน/วันของแต่ละกลุ่ม + OT) — ปรับจำนวนคนที่ใช้แต่ละวันได้ที่หน้า "สรุปตามกิจกรรม" ตัวเลขในหน้านี้จะอัปเดตตามทันที</div>
    <div class="section-title">สรุปรายวัน (ต้นทุนจริง)</div>
    <table><thead><tr><th>วันที่</th><th class="num">รายได้</th><th class="num">ต้นทุน</th><th class="num">กำไร/ขาดทุน</th></tr></thead><tbody>${dayRows}</tbody></table>
    <div class="section-title">สรุปรายเดือน (ต้นทุนจริง)</div>
    <table><thead><tr><th>เดือน</th><th class="num">รายได้</th><th class="num">ต้นทุน</th><th class="num">กำไร/ขาดทุน</th></tr></thead><tbody>${monthRows}</tbody></table>
  `;
}

function updateTimePreview(){
  const preview = document.getElementById('l-time-preview');
  if(!preview) return;
  const activityId = document.getElementById('l-activity').value;
  const volume = Number(document.getElementById('l-volume').value) || 0;
  const act = state.activities.find(a=>a.id===activityId);
  if(!act || !volume){ preview.textContent = ''; return; }

  const regEl = document.getElementById('l-regular-workers');
  const tempEl = document.getElementById('l-temp-workers');
  const actualWorkers = (Number(regEl && regEl.value) || 0) + (Number(tempEl && tempEl.value) || 0);

  // man-minutes per unit is a constant amount of work, independent of how many people split it
  const manMinutesPerUnit = act.minutesPerUnit * act.standardWorkers;
  const totalManMinutes = manMinutesPerUnit * volume;

  if(actualWorkers > 0){
    const actualMinutes = totalManMinutes / actualWorkers;
    const hours = Math.floor(actualMinutes/60);
    const mins = Math.round(actualMinutes%60);
    preview.textContent = `งานทั้งหมด ${fmt(totalManMinutes)} คน-นาที (${act.minutesPerUnit} นาที/ชิ้น × ${act.standardWorkers} คนมาตรฐาน × ${volume} ชิ้น) ÷ ${actualWorkers} คนที่ใช้จริง ≈ ${hours} ชม. ${mins} นาที — เทียบกับเวลาที่ทำงานจริงเพื่อเช็คว่าเร็ว/ช้ากว่ามาตรฐาน`;
  } else {
    const stdMinutes = totalManMinutes / act.standardWorkers;
    const hours = Math.floor(stdMinutes/60);
    const mins = Math.round(stdMinutes%60);
    preview.textContent = `งานทั้งหมด ${fmt(totalManMinutes)} คน-นาที — กรอกจำนวนคนด้านล่างเพื่อดูเวลาที่ควรใช้จริง (ที่คนมาตรฐาน ${act.standardWorkers} คน จะใช้ ≈ ${hours} ชม. ${mins} นาที)`;
  }
}

function exportToExcel(){
  if(typeof XLSX === 'undefined'){ showToast('โหลดไลบรารี Excel ไม่สำเร็จ ลองใหม่อีกครั้ง'); return; }
  const wb = XLSX.utils.book_new();

  // 1. ตั้งค่ากิจกรรม
  const pricingRows = state.activities.map(a=>({
    'กิจกรรม': a.name, 'ราคาขาย/Unit': a.price, 'คนมาตรฐาน': a.standardWorkers,
    'เวลา/Unit (นาที)': a.minutesPerUnit, 'ต้นทุน/Unit (มาตรฐาน)': unitLaborCost(a)
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pricingRows), 'ตั้งค่ากิจกรรม');

  // 2. ต้นทุนพนักงาน (fixed)
  const c = staffCalc();
  const staffRows = [
    {'รายการ':'พนักงานประจำ - จำนวนคน','ค่า': state.staffCost.regularCount},
    {'รายการ':'พนักงานประจำ - เงินเดือน/คน','ค่า': state.staffCost.regularSalary},
    {'รายการ':'พนักงานประจำ - รวม','ค่า': c.regularTotal},
    {'รายการ':'พนักงาน Temp - จำนวนคน','ค่า': state.staffCost.tempCount},
    {'รายการ':'พนักงาน Temp - ค่าจ้าง/คน','ค่า': state.staffCost.tempWage},
    {'รายการ':'พนักงาน Temp - รวม','ค่า': c.tempTotal},
    {'รายการ':'OT พนักงานประจำ - รวม','ค่า': c.regularOtTotal},
    {'รายการ':'ค่าล่วงเวลา Temp - รวม','ค่า': c.tempExtraTotal},
    {'รายการ':'รวมค่าพนักงานทั้งหมด/เดือน','ค่า': c.grandTotal},
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(staffRows), 'ต้นทุนพนักงาน');

  // 3. บันทึกงานประจำวัน (raw log, ทีละรอบ)
  const logRows = [...state.logs].sort((a,b)=>a.date.localeCompare(b.date)).map(l=>{
    const act = state.activities.find(a=>a.id===l.activityId);
    const hoursUsed = logHours(l);
    return {
      'วันที่': l.date, 'ป้ายรอบ': l.roundLabel||'', 'กิจกรรม': act?act.name:'-',
      'คนประจำ': l.regularWorkers||0, 'คนTemp': l.tempWorkers||0, 'คนแผนกอื่น': l.otherWorkers||0,
      'จำนวนงาน': l.volume, 'ชั่วโมงที่ใช้คำนวณ': Number(hoursUsed.toFixed(2)),
      'OT ประจำ (ชม./คน)': l.otHoursRegular||0, 'OT Temp (ชม./คน)': l.otHoursTemp||0,
      'รายได้': Number(logRevenue(l).toFixed(2)), 'ต้นทุน': Number(logCost(l).toFixed(2)),
      'ต้นทุน/ชิ้น': Number(logCostPerUnit(l).toFixed(2)), 'ต้นทุน/คน/ชม.': Number(logCostPerPersonHour(l).toFixed(2)),
      'Productivity (ชิ้น/คน ต่อรอบ)': Number(logProductivity(l).toFixed(2)),
      'กำไร/ขาดทุน': Number(logProfit(l).toFixed(2))
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(logRows), 'บันทึกงานประจำวัน');

  // 4. สรุปตามกิจกรรม - รายวัน & รายเดือน (subtotal per activity per period)
  function buildSummaryRows(periodKeyFn){
    const periods = {};
    state.logs.forEach(l=>{
      const p = periodKeyFn(l);
      periods[p] = periods[p] || {};
      periods[p][l.activityId] = periods[p][l.activityId] || [];
      periods[p][l.activityId].push(l);
    });
    const rows = [];
    Object.keys(periods).sort().forEach(period=>{
      Object.keys(periods[period]).forEach(actId=>{
        const act = state.activities.find(a=>a.id===actId);
        const roundLogs = periods[period][actId];
        const totalVol = roundLogs.reduce((s,l)=>s+Number(l.volume||0),0);
        const totalRev = roundLogs.reduce((s,l)=>s+logRevenue(l),0);
        const totalCost = roundLogs.reduce((s,l)=>s+logCost(l),0);
        rows.push({
          'ช่วงเวลา': period, 'กิจกรรม': act?act.name:'-', 'จำนวนรอบ': roundLogs.length,
          'จำนวนงานรวม': totalVol, 'รายได้รวม': Number(totalRev.toFixed(2)),
          'ต้นทุนรวม': Number(totalCost.toFixed(2)), 'กำไร/ขาดทุน': Number((totalRev-totalCost).toFixed(2))
        });
      });
    });
    return rows;
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(l=>l.date)), 'สรุปกิจกรรม-รายวัน');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildSummaryRows(l=>l.date.slice(0,7))), 'สรุปกิจกรรม-รายเดือน');

  // 5. Rate Card
  const rcRows = state.activities.map(a=>({
    'บริการ': a.name, 'UOM':'THB/Unit', 'ราคา/ชิ้น': a.price, 'Volume/เดือน': a.monthlyVolume||0,
    'ราคารวม': Number((a.price*(a.monthlyVolume||0)).toFixed(2))
  }));
  rcRows.push({'บริการ':'Storage - ค่าจัดเก็บ','UOM':'THB/Unit/Day','ราคา/ชิ้น':state.storage.price,'Volume/เดือน':state.storage.volume,'ราคารวม': Number((state.storage.price*state.storage.volume*state.storage.days).toFixed(2))});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rcRows), 'Rate Card');

  const filename = `warehouse-cost-${todayStr()}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast('ดาวน์โหลดไฟล์ Excel แล้ว');
}

let dashboardCharts = { daily: null, monthly: null, plan: null };

function renderDashboardCharts(){
  const dailyCanvas = document.getElementById('chart-daily');
  const monthlyCanvas = document.getElementById('chart-monthly');
  if(!dailyCanvas || !monthlyCanvas || typeof Chart === 'undefined') return;

  // destroy previous charts to prevent memory leaks
  if(dashboardCharts.daily){ dashboardCharts.daily.destroy(); dashboardCharts.daily = null; }
  if(dashboardCharts.monthly){ dashboardCharts.monthly.destroy(); dashboardCharts.monthly = null; }

  // aggregate — use real labor cost (คนจริง × ค่าแรง/ชม. × ชั่วโมง/วัน) for consistency with the tables above
  const realDaily = dailyRealSummary();
  const realCostByDate = {};
  realDaily.forEach(d=>{ realCostByDate[d.date] = d.laborCost; });

  const byDay = {}, byMonth = {};
  state.logs.forEach(l=>{
    const rev = logRevenue(l);
    byDay[l.date] = byDay[l.date] || {rev:0, cost:0};
    byDay[l.date].rev += rev;
    const m = l.date.slice(0,7);
    byMonth[m] = byMonth[m] || {rev:0, cost:0};
    byMonth[m].rev += rev;
  });
  Object.keys(byDay).forEach(d=>{ byDay[d].cost = realCostByDate[d] || 0; });
  Object.entries(realCostByDate).forEach(([d, cost])=>{
    const m = d.slice(0,7);
    if(byMonth[m]) byMonth[m].cost += cost;
  });

  const dayEntries = Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).slice(-30);
  const monthEntries = Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0]));

  const chartTheme = {
    color: '#F0EFEA',
    grid: 'rgba(255,255,255,0.06)',
    tooltip: '#20242C',
  };
  Chart.defaults.color = chartTheme.color;
  Chart.defaults.font.family = "'Sarabun', 'Inter', system-ui, sans-serif";

  const commonOptions = {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { position: 'top', labels: { boxWidth: 12, padding: 12, font:{size:12} } },
      tooltip: {
        backgroundColor: chartTheme.tooltip,
        titleColor: chartTheme.color, bodyColor: chartTheme.color,
        borderColor: '#383E4A', borderWidth: 1, padding: 10,
        callbacks: { label: (ctx)=> `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} บาท` }
      }
    },
    scales: {
      x: { grid: { color: chartTheme.grid }, ticks: { font:{size:11} } },
      y: { grid: { color: chartTheme.grid }, ticks: { callback: (v)=>fmt(v), font:{size:11} } }
    }
  };

  function makeDataset(entries){
    const labels = entries.map(([k])=>k);
    const revenue = entries.map(([,v])=>v.rev);
    const cost = entries.map(([,v])=>v.cost);
    const profit = entries.map(([,v])=>v.rev-v.cost);
    return { labels, revenue, cost, profit };
  }

  const daily = makeDataset(dayEntries);
  const monthly = makeDataset(monthEntries);

  const buildDatasets = (d) => [
    { label:'รายได้', data:d.revenue, borderColor:'#4FD1C5', backgroundColor:'rgba(79,209,197,0.1)', borderWidth:2, tension:0.3, fill:false, pointRadius:3, pointHoverRadius:6 },
    { label:'ต้นทุน', data:d.cost, borderColor:'#F0776B', backgroundColor:'rgba(240,119,107,0.1)', borderWidth:2, tension:0.3, fill:false, pointRadius:3, pointHoverRadius:6 },
    { label:'กำไร/ขาดทุน', data:d.profit, borderColor:'#F4C94E', backgroundColor:'rgba(244,201,78,0.15)', borderWidth:3, tension:0.3, fill:true, pointRadius:4, pointHoverRadius:7 },
  ];

  dashboardCharts.daily = new Chart(dailyCanvas, {
    type:'line',
    data: { labels: daily.labels, datasets: buildDatasets(daily) },
    options: commonOptions
  });

  dashboardCharts.monthly = new Chart(monthlyCanvas, {
    type:'line',
    data: { labels: monthly.labels, datasets: buildDatasets(monthly) },
    options: commonOptions
  });
}

function renderWorkforcePlanChart(){
  const canvas = document.getElementById('chart-plan-weekday');
  if(!canvas || typeof Chart === 'undefined') return;
  if(dashboardCharts.plan){ dashboardCharts.plan.destroy(); dashboardCharts.plan = null; }

  const weekday = planByWeekday();
  const chartTheme = { color: '#F0EFEA', grid: 'rgba(255,255,255,0.06)', tooltip: '#20242C' };

  dashboardCharts.plan = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: weekday.map(w=>w.label),
      datasets: [
        { label: 'เฉลี่ย (คน)', data: weekday.map(w=>Number(w.avgHeadcount.toFixed(2))), backgroundColor: 'rgba(79,209,197,0.55)', borderRadius: 6 },
        { label: 'Peak (คน)', data: weekday.map(w=>Number(w.peakHeadcount.toFixed(2))), backgroundColor: 'rgba(240,119,107,0.6)', borderRadius: 6 },
        { label: 'แนะนำสำรอง (คน)', data: weekday.map(w=>w.recommended), backgroundColor: 'rgba(244,201,78,0.45)', borderRadius: 6 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, padding: 12, font:{size:12} } },
        tooltip: {
          backgroundColor: chartTheme.tooltip, titleColor: chartTheme.color, bodyColor: chartTheme.color,
          borderColor: '#383E4A', borderWidth: 1, padding: 10,
          callbacks: { label: (ctx)=> `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} คน` }
        }
      },
      scales: {
        x: { grid: { color: chartTheme.grid }, ticks: { font:{size:11} } },
        y: { grid: { color: chartTheme.grid }, ticks: { font:{size:11} }, beginAtZero: true }
      }
    }
  });
}

function attachHandlers(){
  const dateFilter = document.getElementById('activity-date-filter');
  if(dateFilter) dateFilter.onchange = ()=>{
    state.activityBreakdownDate = dateFilter.value;
    render();
  };

  const dailyCostDateFilter = document.getElementById('daily-cost-date-filter');
  if(dailyCostDateFilter) dailyCostDateFilter.onchange = ()=>{
    state.dailyCostDateFilter = dailyCostDateFilter.value;
    render();
  };

  const monthFilter = document.getElementById('activity-month-filter');
  if(monthFilter) monthFilter.onchange = ()=>{
    state.activityBreakdownMonth = monthFilter.value;
    render();
  };

  const logDateFilter = document.getElementById('log-date-filter');
  if(logDateFilter) logDateFilter.onchange = ()=>{
    state.logHistoryDateFilter = logDateFilter.value;
    render();
  };

  const exportBtn = document.getElementById('export-excel');
  if(exportBtn) exportBtn.onclick = exportToExcel;

  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.onclick = ()=>{ state.tab = el.dataset.tab; render(); };
  });


  document.querySelectorAll('[data-hc-key]').forEach(el=>{
    el.onchange = async ()=>{
      const key = el.dataset.hcKey;
      const field = el.dataset.hcField;
      state.manualHeadcounts[key] = state.manualHeadcounts[key] || {};
      if(el.value === ''){ delete state.manualHeadcounts[key][field]; }
      else { state.manualHeadcounts[key][field] = Number(el.value)||0; }
      if(Object.keys(state.manualHeadcounts[key]).length === 0) delete state.manualHeadcounts[key];
      try{
        const hc = state.manualHeadcounts[key] || {};
        await sb.from('manual_headcounts').upsert({ key, regular: hc.regular ?? null, temp: hc.temp ?? null, other: hc.other ?? null });
        showToast('บันทึกจำนวนคนแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-field]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.id);
      if(!act) return;
      act[el.dataset.field] = Number(el.value)||0;
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดตแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-activity-hc]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.activityHc);
      if(!act) return;
      const field = el.dataset.activityHcField; // 'regular' or 'temp'
      const val = Number(el.value)||0;
      if(field === 'regular') act.standardRegularWorkers = val;
      else if(field === 'temp') act.standardTempWorkers = val;
      act.standardWorkers = Number(act.standardRegularWorkers||0) + Number(act.standardTempWorkers||0);
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดตจำนวนคนมาตรฐานแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-rc-price]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.rcPrice);
      if(!act) return;
      act.price = Number(el.value)||0;
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดตราคา/ชิ้นแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });
  document.querySelectorAll('[data-rc-volume]').forEach(el=>{
    el.onchange = async ()=>{
      const act = state.activities.find(a=>a.id===el.dataset.rcVolume);
      if(!act) return;
      act.monthlyVolume = Number(el.value)||0;
      try{
        await sb.from('activities').update(activityToRow(act)).eq('id', act.id);
        render(); showToast('อัปเดต Volume แล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  const addActivityBtn = document.getElementById('add-activity-btn');
  if(addActivityBtn) addActivityBtn.onclick = async ()=>{
    const nameEl = document.getElementById('new-activity-name');
    const priceEl = document.getElementById('new-activity-price');
    const workersEl = document.getElementById('new-activity-workers');
    const minutesEl = document.getElementById('new-activity-minutes');
    const name = nameEl.value.trim();
    if(!name){ showToast('กรอกชื่อกิจกรรมก่อน'); return; }
    const maxSortOrder = state.activities.reduce((max,a)=>Math.max(max, a.sortOrder||0), 0);
    const newAct = {
      id: uid(), name,
      price: Number(priceEl.value)||0,
      standardWorkers: Number(workersEl.value)||1,
      minutesPerUnit: Number(minutesEl.value)||0,
      monthlyVolume: 0,
      standardRegularWorkers: Number(workersEl.value)||1,
      standardTempWorkers: 0,
      sortOrder: maxSortOrder + 1
    };
    try{
      await sb.from('activities').insert(activityToRow(newAct));
      state.activities.push(newAct);
      render(); showToast(`เพิ่มกิจกรรม "${name}" แล้ว`);
    }catch(e){ console.error(e); showToast('เพิ่มกิจกรรมไม่สำเร็จ ลองใหม่อีกครั้ง'); }
  };

  document.querySelectorAll('[data-del-activity]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.delActivity;
      const act = state.activities.find(a=>a.id===id);
      if(!act) return;
      if(!confirm(`ลบกิจกรรม "${act.name}" ใช่ไหม? (บันทึกงานเก่าที่อ้างถึงกิจกรรมนี้จะยังอยู่ แต่จะไม่โชว์ชื่อกิจกรรมถูกต้อง)`)) return;
      try{
        await sb.from('activities').delete().eq('id', id);
        state.activities = state.activities.filter(a=>a.id!==id);
        render(); showToast('ลบกิจกรรมแล้ว');
      }catch(e){ console.error(e); showToast('ลบไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-storage]').forEach(el=>{
    el.onchange = async ()=>{
      state.storage[el.dataset.storage] = Number(el.value)||0;
      try{
        await sb.from('storage_settings').update({ price: state.storage.price, volume: state.storage.volume, days: state.storage.days }).eq('id', 1);
        render(); showToast('อัปเดต Storage แล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  function saveInvoiceInfo(){
    try{ localStorage.setItem('invoiceInfo', JSON.stringify(state.invoiceInfo)); }catch(e){}
  }
  const invCustomerName = document.getElementById('inv-customer-name');
  if(invCustomerName) invCustomerName.onchange = ()=>{ state.invoiceInfo.customerName = invCustomerName.value; saveInvoiceInfo(); render(); };
  const invCustomerAddress = document.getElementById('inv-customer-address');
  if(invCustomerAddress) invCustomerAddress.onchange = ()=>{ state.invoiceInfo.customerAddress = invCustomerAddress.value; saveInvoiceInfo(); render(); };
  const invNumber = document.getElementById('inv-number');
  if(invNumber) invNumber.onchange = ()=>{ state.invoiceInfo.invoiceNo = invNumber.value; saveInvoiceInfo(); render(); };
  const invBillingStart = document.getElementById('inv-billing-start');
  if(invBillingStart) invBillingStart.onchange = ()=>{ state.invoiceInfo.billingStart = invBillingStart.value; saveInvoiceInfo(); render(); };
  const invBillingEnd = document.getElementById('inv-billing-end');
  if(invBillingEnd) invBillingEnd.onchange = ()=>{ state.invoiceInfo.billingEnd = invBillingEnd.value; saveInvoiceInfo(); render(); };
  const invIssueDate = document.getElementById('inv-issue-date');
  if(invIssueDate) invIssueDate.onchange = ()=>{ state.invoiceInfo.issueDate = invIssueDate.value; saveInvoiceInfo(); render(); };
  const invVatEnabled = document.getElementById('inv-vat-enabled');
  if(invVatEnabled) invVatEnabled.onchange = ()=>{ state.invoiceInfo.vatEnabled = invVatEnabled.value === 'yes'; saveInvoiceInfo(); render(); };
  const invIncludeItemDetail = document.getElementById('inv-include-item-detail');
  if(invIncludeItemDetail) invIncludeItemDetail.onchange = ()=>{ state.invoiceInfo.includeItemDetail = invIncludeItemDetail.value === 'yes'; saveInvoiceInfo(); render(); };
  const exportInvoiceBtn = document.getElementById('export-invoice-pdf');
  if(exportInvoiceBtn) exportInvoiceBtn.onclick = ()=>{ window.print(); };

  document.querySelectorAll('details[id^="item-details-"]').forEach(d=>{
    d.addEventListener('toggle', ()=>{
      const activityId = d.id.replace('item-details-','');
      state.expandedItemActivities[activityId] = d.open;
    });
  });

  document.querySelectorAll('.add-item-records-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      const activityId = btn.dataset.activityForItem;
      const dateEl = document.getElementById(`item-date-${activityId}`);
      const refEl = document.getElementById(`item-ref-${activityId}`);
      const listEl = document.getElementById(`item-imei-list-${activityId}`);
      const date = dateEl.value;
      const ref = refEl ? refEl.value.trim() : '';
      if(!date){ showToast('เลือกวันที่ก่อน'); return; }
      const imeis = listEl.value.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
      if(!imeis.length){ showToast('กรอกเลข IMEI อย่างน้อย 1 เครื่อง'); return; }
      const newRecords = imeis.map(imei=>({ id: uid(), imei, activityId, date, ref }));
      try{
        await sb.from('item_records').insert(newRecords.map(itemRecordToRow));
        state.itemRecords = state.itemRecords.concat(newRecords);
        state.expandedItemActivities[activityId] = true; // keep the accordion open after re-render
        render(); showToast(`เพิ่ม ${newRecords.length} รายการแล้ว`);
      }catch(e){ console.error(e); showToast('เพิ่มรายการไม่สำเร็จ ลองใหม่อีกครั้ง'); }
    };
  });

  document.querySelectorAll('[data-del-item-record]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.delItemRecord;
      const rec = state.itemRecords.find(r=>r.id===id);
      try{
        await sb.from('item_records').delete().eq('id', id);
        state.itemRecords = state.itemRecords.filter(r=>r.id!==id);
        if(rec) state.expandedItemActivities[rec.activityId] = true;
        render(); showToast('ลบรายการแล้ว');
      }catch(e){ console.error(e); showToast('ลบไม่สำเร็จ'); }
    };
  });

  document.querySelectorAll('[data-timesetting]').forEach(el=>{
    el.onchange = ()=>{
      state.timeSettings[el.dataset.timesetting] = Number(el.value)||0;
      render(); showToast('อัปเดตแล้ว (ค่าชั่วคราว ไม่ได้บันทึกถาวร)');
    };
  });

  document.querySelectorAll('[data-plan]').forEach(el=>{
    el.onchange = ()=>{
      const field = el.dataset.plan;
      state.planSettings[field] = Number(el.value)||0;
      try{ localStorage.setItem('planBufferPct', state.planSettings.bufferPct); }catch(e){}
      render(); showToast('อัปเดตแผนกำลังคนแล้ว');
    };
  });

  document.querySelectorAll('[data-daily-cost-date]').forEach(el=>{
    el.onchange = ()=>{
      const date = el.dataset.dailyCostDate;
      const field = el.dataset.dailyCostField;
      state.dailyCostOverrides[date] = state.dailyCostOverrides[date] || {};
      if(el.value === ''){ delete state.dailyCostOverrides[date][field]; }
      else { state.dailyCostOverrides[date][field] = Number(el.value)||0; }
      if(Object.keys(state.dailyCostOverrides[date]).length === 0) delete state.dailyCostOverrides[date];
      try{ localStorage.setItem('dailyCostOverrides', JSON.stringify(state.dailyCostOverrides)); }catch(e){}
      render(); showToast('อัปเดตต้นทุนวันนี้แล้ว (เก็บไว้ในเบราว์เซอร์นี้เท่านั้น)');
    };
  });

  const wageOverrideInput = document.querySelector('[data-wage-override]');
  if(wageOverrideInput) wageOverrideInput.onchange = ()=>{
    const v = wageOverrideInput.value;
    state.wageOverride = v === '' ? null : Number(v);
    render(); showToast('ตั้งค่าแรงเองแล้ว (ค่าชั่วคราว ไม่ได้บันทึกถาวร)');
  };
  const clearWageOverride = document.getElementById('clear-wage-override');
  if(clearWageOverride) clearWageOverride.onclick = ()=>{
    state.wageOverride = null;
    render(); showToast('กลับไปใช้ค่าคำนวณอัตโนมัติแล้ว');
  };

  document.querySelectorAll('[data-staff]').forEach(el=>{
    el.onchange = async ()=>{
      state.staffCost[el.dataset.staff] = Number(el.value)||0;
      try{
        await sb.from('staff_cost').update(staffCostToRow(state.staffCost)).eq('id', 1);
        render(); showToast('อัปเดตต้นทุนพนักงานแล้ว');
      }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ'); }
    };
  });

  const addLog = document.getElementById('add-log');
  const lVolume = document.getElementById('l-volume');
  const lActivity = document.getElementById('l-activity');
  const lRegularWorkers = document.getElementById('l-regular-workers');
  const lTempWorkers = document.getElementById('l-temp-workers');
  if(lVolume) lVolume.oninput = updateTimePreview;
  if(lActivity) lActivity.onchange = updateTimePreview;
  if(lRegularWorkers) lRegularWorkers.oninput = updateTimePreview;
  if(lTempWorkers) lTempWorkers.oninput = updateTimePreview;
  if(lVolume || lActivity) updateTimePreview();
  if(addLog) addLog.onclick = async ()=>{
    const date = document.getElementById('l-date').value || todayStr();
    const activityId = document.getElementById('l-activity').value;
    const roundLabel = document.getElementById('l-round-label').value.trim();
    const volume = Number(document.getElementById('l-volume').value);
    const regularWorkers = Number(document.getElementById('l-regular-workers').value) || 0;
    const tempWorkers = Number(document.getElementById('l-temp-workers').value) || 0;
    const otherWorkers = Number(document.getElementById('l-other-workers').value) || 0;
    const otHoursRegular = Number(document.getElementById('l-ot-regular').value) || 0;
    const otHoursTemp = Number(document.getElementById('l-ot-temp').value) || 0;
    const actualHoursPart = Number(document.getElementById('l-actual-hours').value) || 0;
    const actualMinutesPart = Number(document.getElementById('l-actual-minutes').value) || 0;
    const actualHours = actualHoursPart + (actualMinutesPart/60);
    if(!volume || (!regularWorkers && !tempWorkers)){ showToast('กรอกจำนวนงานที่ได้ และคนอย่างน้อย 1 กลุ่มก่อน'); return; }
    const newLog = {id:uid(), date, activityId, roundLabel, volume, regularWorkers, tempWorkers, otherWorkers, otHoursRegular, otHoursTemp, actualHours};
    try{
      await sb.from('work_logs').insert(logToRow(newLog));
      state.logs.push(newLog);
      state.lastLogDate = date; state.lastLogActivity = activityId; // remember for next round's default
      render(); showToast('บันทึกรอบนี้แล้ว — กรอกรอบถัดไปต่อได้เลย');
    }catch(e){ console.error(e); showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง'); }
  };
  document.querySelectorAll('[data-del-log]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.delLog;
      try{
        await sb.from('work_logs').delete().eq('id', id);
        state.logs = state.logs.filter(l=>l.id!==id);
        render();
      }catch(e){ console.error(e); showToast('ลบไม่สำเร็จ'); }
    };
  });

  // draw dashboard charts if on dashboard tab (use rAF to ensure canvas is in DOM)
  if(state.tab === 'dashboard'){
    requestAnimationFrame(()=>renderDashboardCharts());
  }
  if(state.tab === 'workforceplan'){
    requestAnimationFrame(()=>renderWorkforcePlanChart());
  }
}

load();
</script>
